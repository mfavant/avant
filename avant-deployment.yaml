apiVersion: apps/v1
kind: Deployment
metadata:
  name: avant-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: avant
  template:
    metadata:
      labels:
        app: avant
    spec:
      volumes:
        - name: avant-data
          hostPath:
            path: /

      containers:
        - name: avant
          image: gaowanlu/avant:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 20023
              name: http
              protocol: TCP

          resources:
            requests:
              cpu: "1000m"
              memory: "128Mi"
            limits:
              cpu: "2000m"
              memory: "512Mi"

          volumeMounts:
            - name: avant-data
              mountPath: "/avant_static"

          livenessProbe:
            httpGet:
              path: /
              port: 20023
            initialDelaySeconds: 120
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /
              port: 20023
            initialDelaySeconds: 120
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: avant-service
spec:
  selector:
    app: avant
  ports:
    - protocol: TCP
      port: 80
      targetPort: 20023
  type: NodePort
